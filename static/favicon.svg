<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#f8f9ff"/>
        </linearGradient>
        <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#667eea" />
            <stop offset="100%" stop-color="#11998e" />
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="15" stdDeviation="20" flood-color="#11998e" flood-opacity="0.3" />
        </filter>
    </defs>
    
    <!-- Smooth App Icon Background -->
    <rect width="512" height="512" rx="120" fill="url(#bg)" />
    
    <!-- Dynamic Heart + Cross Icon -->
    <g filter="url(#shadow)" transform="translate(106, 126)">
        <path d="M150,0 C80,0 20,50 20,130 C20,230 150,330 150,330 C150,330 280,230 280,130 C280,50 220,0 150,0 Z" fill="url(#mainGrad)" />
        <!-- Inner Cross Cutout -->
        <path d="M150,60 L150,200 M80,130 L220,130" stroke="#ffffff" stroke-width="32" stroke-linecap="round" />
    </g>
</svg>
