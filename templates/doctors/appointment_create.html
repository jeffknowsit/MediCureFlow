{% extends 'base.html' %}
{% load static %}

{% block title %}Manual Booking — MediCureFlow{% endblock %}

{% block extra_css %}
<style>
.form-container { max-width: 600px; margin: 40px auto; padding: 40px; background: #fff; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); }
.form-title { font-size: 1.8rem; font-weight: 800; color: #1a1a2e; margin-bottom: 12px; text-align: center; }
.form-subtitle { color: #888; text-align: center; margin-bottom: 32px; font-size: 0.95rem; }

.field-group { margin-bottom: 24px; }
.field-group label { display: block; font-size: 0.85rem; font-weight: 700; color: #555; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.field-input { width: 100%; padding: 12px 16px; border: 2px solid #e8e8f0; border-radius: 12px; font-size: 0.95rem; font-family: inherit; }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

.btn-submit { width: 100%; padding: 14px; background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: #fff; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: all 0.3s; margin-top: 20px; }
.btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 15px rgba(16, 185, 129, 0.2); }
</style>
{% endblock %}

{% block content %}
<div class="form-container">
    <h1 class="form-title">Manual Appointment Booking</h1>
    <p class="form-subtitle">Book an appointment for a patient manually.</p>
    
    <form method="post">
        {% csrf_token %}
        <div class="field-group">
            <label>Select Patient</label>
            <select name="patient" class="field-input">
                {% for patient in patients %}
                    <option value="{{ patient.id }}">{{ patient.get_full_name }} ({{ patient.username }})</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-row">
            <div class="field-group">
                <label>Date</label>
                <input type="date" name="appointment_date" class="field-input">
            </div>
            <div class="field-group">
                <label>Time</label>
                <input type="time" name="appointment_time" class="field-input">
            </div>
        </div>

        <div class="field-group">
            <label>Duration (Minutes)</label>
            <input type="number" name="duration_minutes" class="field-input" value="30">
        </div>

        <div class="field-group">
            <label>Visit Reason / Notes</label>
            <textarea name="patient_notes" class="field-input" rows="4" placeholder="Briefly describe the reason for visit..."></textarea>
        </div>

        <button type="submit" class="btn-submit">Create Appointment</button>
    </form>
</div>
{% endblock %}
